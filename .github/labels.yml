# Hivemind GitHub Labels
# Apply with: gh label create <name> --color <color> --description <desc>

# Priority
- name: "priority: critical"
  color: "d73a4a"
  description: "Must be fixed ASAP"
- name: "priority: high"
  color: "ff6b6b"
  description: "Important — should be addressed soon"
- name: "priority: medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have"

# Type
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: "agent-proposal"
  color: "7057ff"
  description: "Proposal for a new specialist agent"
- name: "runtime"
  color: "e99695"
  description: "Related to agent runtimes (OpenClaw, Claude, etc.)"
- name: "template"
  color: "bfdadc"
  description: "Related to project templates"

# Status
- name: "triage"
  color: "ededed"
  description: "Needs triage and classification"
- name: "in progress"
  color: "1d76db"
  description: "Currently being worked on"
- name: "blocked"
  color: "b60205"
  description: "Blocked by another issue or dependency"

# Contributor-friendly
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers — well-scoped and documented"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "hacktoberfest"
  color: "ff7518"
  description: "Hacktoberfest eligible"

# Component
- name: "component: dashboard"
  color: "c5def5"
  description: "Related to the web dashboard"
- name: "component: dag-engine"
  color: "c5def5"
  description: "Related to the DAG executor"
- name: "component: agents"
  color: "c5def5"
  description: "Related to agent system"
- name: "component: org-hierarchy"
  color: "c5def5"
  description: "Related to organizational hierarchy"
- name: "component: cli"
  color: "c5def5"
  description: "Related to create-hivemind CLI"
- name: "component: api"
  color: "c5def5"
  description: "Related to REST API"
