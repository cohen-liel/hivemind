services:
  bot:
    build: .
    container_name: claude-bot
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      # Persist session database across restarts
      - ./data:/app/data
      # Mount projects directory (read-write — agents need to create/edit files)
      - ${CLAUDE_PROJECTS_DIR:-~/claude-projects}:/projects
    env_file:
      - .env
    environment:
      - CLAUDE_PROJECTS_DIR=/projects
      - CONVERSATION_STORE_DIR=/app/data
      - LOG_FORMAT=${LOG_FORMAT:-json}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── E2E test runner (activated with --profile test) ──────────────────
  # Playwright's webServer config starts Vite inside the container.
  # The bot service provides the backend API (tests hit localhost:5173 → Vite proxy → bot:8080).
  test-runner:
    build:
      context: .
      target: test-runner
    profiles: ["test"]
    depends_on:
      bot:
        condition: service_healthy
    environment:
      - CI=true
      - VITE_API_BASE_URL=http://bot:8080
    volumes:
      # Export test artifacts to host for inspection
      - ./frontend/playwright-report:/app/frontend/playwright-report
      - ./frontend/test-results:/app/frontend/test-results
